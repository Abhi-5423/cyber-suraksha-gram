{% extends "base.html" %}
{% block content %}
<section class="container py-5">
  <h1>Users</h1>
  <div class="table-responsive"><table class="table align-middle">
    <thead><tr><th>Name</th><th>Email</th><th>Village</th><th>Score</th><th>Role</th><th>Action</th></tr></thead>
    <tbody>
    {% for user in users %}
      <tr>
        <td>{{ user.full_name }}</td><td>{{ user.email }}</td><td>{{ user.village }}</td><td>{{ user.score }}</td>
        <td>
          <form method="post" class="d-flex gap-2">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="user_id" value="{{ user.id }}">
            <select name="{{ user.id }}-role" class="form-select form-select-sm">
              {% for value, label in [("citizen","Village Citizen"),("volunteer","Awareness Volunteer"),("admin","Administrator")] %}
              <option value="{{ value }}" {% if user.role == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
        </td>
        <td><button class="btn btn-outline-success btn-sm">Update</button></form></td>
      </tr>
    {% endfor %}
    </tbody>
  </table></div>
</section>
{% endblock %}
