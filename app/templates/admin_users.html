{% extends "base.html" %}
{% block content %}
<section class="container py-5">
  <h1>{{ tr("users") }}</h1>
  <div class="table-responsive"><table class="table align-middle">
    <thead><tr><th>{{ tr("name") }}</th><th>{{ tr("email") }}</th><th>{{ tr("village") }}</th><th>{{ tr("score") }}</th><th>{{ tr("role") }}</th><th>{{ tr("action") }}</th></tr></thead>
    <tbody>
    {% for user in users %}
      <tr>
        <td>{{ user.full_name }}</td><td>{{ user.email }}</td><td>{{ user.village }}</td><td>{{ user.score }}</td>
        <td>
          <form method="post" class="d-flex gap-2">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="user_id" value="{{ user.id }}">
            <select name="{{ user.id }}-role" class="form-select form-select-sm">
              {% for value, label_key in [("citizen","village_citizen"),("volunteer","awareness_volunteer"),("admin","administrator")] %}
              <option value="{{ value }}" {% if user.role == value %}selected{% endif %}>{{ tr(label_key) }}</option>
              {% endfor %}
            </select>
        </td>
        <td><button class="btn btn-outline-success btn-sm">{{ tr("update") }}</button></form></td>
      </tr>
    {% endfor %}
    </tbody>
  </table></div>
</section>
{% endblock %}
