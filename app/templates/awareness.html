{% extends "base.html" %}
{% block content %}
<section class="container py-5">
  <h1>Cyber Awareness</h1>
  <div class="row g-3 mt-2">
    {% for article in articles %}
    <div class="col-lg-6">
      <article class="info-card h-100">
        <span class="badge text-bg-success">{{ article.category }}</span>
        <h2>{{ article.title }}</h2>
        {% for line in article.content.split('\n') %}
          <p>{{ line }}</p>
        {% endfor %}
      </article>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
