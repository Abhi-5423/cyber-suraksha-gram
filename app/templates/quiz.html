{% extends "base.html" %}
{% block content %}
<section class="container py-5">
  <h1>Cyber Awareness Quiz</h1>
  <form method="post" class="quiz-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% for q in questions %}
    <fieldset class="tool-panel mb-3">
      <legend>{{ loop.index }}. {{ q.question }}</legend>
      {% for key, value in [("A", q.option_a), ("B", q.option_b), ("C", q.option_c), ("D", q.option_d)] %}
      <label class="option"><input type="radio" name="q{{ q.id }}" value="{{ key }}" required> {{ value }}</label>
      {% endfor %}
    </fieldset>
    {% endfor %}
    <button class="btn btn-success btn-lg">Submit Quiz</button>
  </form>
</section>
{% endblock %}
