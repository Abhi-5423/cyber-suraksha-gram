services:
  - type: web
    name: cyber-suraksha-gram
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////tmp/cyber_suraksha.db
      - key: FLASK_ENV
        value: production
      - key: RATELIMIT_STORAGE_URI
        value: memory://
